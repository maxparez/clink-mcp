clients:
  codex:
    command: "codex exec"
    args: ["--json", "--skip-git-repo-check", "--sandbox", "read-only", "-c", "model_reasoning_effort=\"high\""]
    models:
      default: "gpt-5.4"
      available: ["gpt-5.4", "gpt-5.4-mini", "gpt-5.3-codex", "gpt-5.2"]
    roles:
      default:
        prompt_file: "prompts/consult.txt"
      codereviewer:
        prompt_file: "prompts/codereview.txt"
      docgen:
        prompt_file: "prompts/docgen.txt"

  gemini:
    command: "gemini"
    args: ["--output-format", "json"]
    models:
      default: "gemini-3-flash-preview"
      available:
        - "gemini-2.5-pro"
        - "gemini-2.5-flash"
        - "gemini-2.5-flash-lite"
        - "gemini-3.1-pro-preview"
        - "gemini-3-flash-preview"
        - "gemini-3.1-flash-lite-preview"
    roles:
      default:
        prompt_file: "prompts/consult.txt"
      trusted:
        prompt_file: "prompts/consult.txt"
        args: ["--yolo"]
      codereviewer:
        prompt_file: "prompts/codereview.txt"
      docgen:
        prompt_file: "prompts/docgen.txt"

  claude:
    command: "claude"
    args: ["--output-format", "json", "--effort", "high"]
    prompt_flag: "-p"
    models:
      default: "opus"
      available: ["opus", "sonnet", "haiku"]
    roles:
      default:
        prompt_file: "prompts/consult.txt"
      codereviewer:
        prompt_file: "prompts/codereview.txt"
        args: ["--tools", "Bash,Read,Glob,Grep"]
      docgen:
        prompt_file: "prompts/docgen.txt"
        args: ["--tools", "Read,Glob,Grep"]
